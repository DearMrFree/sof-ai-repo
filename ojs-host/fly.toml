# Fly app config for the sof.ai OJS instance.
#
# Prereqs are spelled out in ojs-host/README.md: create the app, provision
# a 3GB volume, attach a Fly Postgres cluster, and set OJS_DB_HOST /
# OJS_DB_USER / OJS_DB_PASSWORD / OJS_ADMIN_USER / OJS_ADMIN_PASS /
# OJS_ADMIN_EMAIL as Fly secrets. Then ``fly deploy -c ojs-host/fly.toml``.
#
# The image extends pkpofficial/ojs:3_4_0-5 and wires in a postgres-aware
# CLI installer (see Dockerfile). On first boot the installer POSTs the
# install form to Apache running on the same machine, so by the time the
# machine is marked healthy, OJS is fully configured.

app = "sofai-ojs"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Public URL the instance will live at. The OJS install form writes this
  # into config.inc.php as ``base_url``; everything OJS emits (email links,
  # OAI repository ID, RSS permalinks) uses it.
  #
  # Keep in sync with sof-ai-api's OJS_BASE_URL secret once we set that up.
  SERVERNAME = "sofai-ojs.fly.dev"
  # Trigger the (patched) ojs-cli-install on the first boot where
  # ``installed = Off`` in config.inc.php. Idempotent — re-runs are no-ops
  # because the first POST flips the flag to ``On``.
  OJS_CLI_INSTALL = "1"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm so the CLI install doesn't need to race
  # Fly's cold-start on every deploy.
  min_machines_running = 1
  processes = ["app"]

# Fly's HTTP health check requires a 2xx status, but every OJS landing
# path 302s while the app is healthy (to the default context, or to the
# language-prefixed home). Skip the HTTP check and let Fly rely on the
# container's liveness + Apache's TCP socket being open. A dead Apache
# exits the machine; a running one is routeable.

[[mounts]]
  source = "ojs_files"
  destination = "/var/www/files"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
