# fly.toml — sof.ai LMS backend.
#
# Deploys FastAPI to Fly.io. The app name must match an existing Fly app on
# your account. Create it once with: fly apps create sofai
app = "sofai"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Bind to the port Fly proxies to by default.
  PORT = "8000"
  # Pin SQLite to the persistent volume mounted at /data (see [[mounts]]).
  # Keeping this in [env] rather than fly secrets means a fresh repo-driven
  # deploy can't silently fall back to the default sqlite:///./sof_ai.db and
  # write to the ephemeral container FS.
  DATABASE_URL = "sqlite:////data/sof_ai.db"

[http_service]
  internal_port = 8000
  force_https = true
  # SQLite lives on a volume attached to a single machine; we must keep
  # exactly one machine running so writes don't land on an ephemeral FS
  # and so a second machine can't race the DB file.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "sof_ai_data"
  destination = "/data"
  initial_size = "1gb"
